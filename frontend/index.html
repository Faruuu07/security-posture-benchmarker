<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security AI Tool</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            background: #2a5298;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #1e3c72;
        }

        #responseBox {
            margin-top: 20px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            font-size: 14px;
        }

        .error { color: red; }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .copy-btn {
            margin-top: 10px;
            background: #28a745;
        }

        .copy-btn:hover {
            background: #1e7e34;
        }

        .dark {
            background: #121212;
            color: white;
        }

        .dark .container {
            background: #1e1e1e;
            color: white;
        }

        .fade {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔐 Security AI Tool</h2>

    <input type="text" id="userInput" placeholder="Enter vulnerability (e.g. XSS, SQL Injection)" />

    <br>

    <button onclick="sendData()">Explain</button>
    <button onclick="getHistory()">📜 History</button>
    <button onclick="clearHistory()">🗑 Clear</button>
    <button onclick="toggleMode()">🌙 Mode</button>

    <div id="responseBox"></div>
</div>

<script>

// 🔥 LIVE BACKEND URL
const BASE_URL = "https://security-posture-benchmarker.onrender.com";


// 🔹 Explain
async function sendData() {
    const input = document.getElementById("userInput").value;
    const responseBox = document.getElementById("responseBox");

    if (!input) {
        responseBox.innerHTML = "<p class='error'>⚠️ Please enter something</p>";
        return;
    }

    responseBox.innerHTML = "<div class='loader'></div>";

    try {
        const res = await fetch(`${BASE_URL}/describe`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input: input })
        });

        const data = await res.json();

        responseBox.innerHTML = `
            <div class="fade">
                <p id="resultText">${data.response}</p>
                <button class="copy-btn" onclick="copyText()">📋 Copy</button>
            </div>
        `;

    } catch (error) {
        responseBox.innerHTML = "<p class='error'>❌ Server not responding</p>";
    }
}


// 🔹 History
async function getHistory() {
    const responseBox = document.getElementById("responseBox");

    responseBox.innerHTML = "<div class='loader'></div>";

    try {
        const res = await fetch(`${BASE_URL}/history`);
        const data = await res.json();

        if (data.length === 0) {
            responseBox.innerHTML = "<p>No history yet</p>";
            return;
        }

        let output = "";

        data.forEach(item => {
            output += `
                <div class="fade">
                    <hr>
                    <b>Input:</b> ${item.input} <br>
                    <b>Response:</b> ${item.response} <br>
                </div>
            `;
        });

        responseBox.innerHTML = output;

    } catch (error) {
        responseBox.innerHTML = "<p class='error'>❌ Failed to load history</p>";
    }
}


// 🔥 CLEAR HISTORY
async function clearHistory() {
    const responseBox = document.getElementById("responseBox");

    responseBox.innerHTML = "<div class='loader'></div>";

    try {
        await fetch(`${BASE_URL}/clear-history`, { method: "POST" });
        responseBox.innerHTML = "<p>🧹 History Cleared</p>";

    } catch (error) {
        responseBox.innerHTML = "<p class='error'>❌ Error clearing history</p>";
    }
}


// 🔥 COPY
function copyText() {
    const text = document.getElementById("resultText").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}


// 🌙 DARK MODE
function toggleMode() {
    document.body.classList.toggle("dark");
}


// ⌨️ ENTER KEY
document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendData();
    }
});

</script>

</body>
</html>
